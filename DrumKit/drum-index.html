<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JS DJ Game</title>
    <link
      rel="stylesheet"
      href="drum-style.css" />
    <link
      rel="icon"
      href="https://fav.farm/🔥" />
  </head>
  <body>
    <div class="keys">
      <div
        data-key="65"
        class="key">
        <kbd>A</kbd>
        <span class="sound">drop a beat</span>
      </div>
      <div
        data-key="83"
        class="key">
        <kbd>S</kbd>
        <span class="sound">laser</span>
      </div>
      <div
        data-key="68"
        class="key">
        <kbd>D</kbd>
        <span class="sound">bing-bong</span>
      </div>
      <div
        data-key="70"
        class="key">
        <kbd>F</kbd>
        <span class="sound">air horn</span>
      </div>
      <div
        data-key="71"
        class="key">
        <kbd>G</kbd>
        <span class="sound">wind-up</span>
      </div>
      <div
        data-key="72"
        class="key">
        <kbd>H</kbd>
        <span class="sound">bong</span>
      </div>
      <div
        data-key="74"
        class="key">
        <kbd>J</kbd>
        <span class="sound">winning</span>
      </div>
      <div
        data-key="75"
        class="key">
        <kbd>K</kbd>
        <span class="sound">scratch</span>
      </div>
      <div
        data-key="76"
        class="key">
        <kbd>L</kbd>
        <span class="sound">wonk</span>
      </div>
    </div>

    <audio
      data-key="65"
      src="sounds/dropABeat.mp3"></audio>
    <audio
      data-key="83"
      src="sounds/laser.mp3"></audio>
    <audio
      data-key="68"
      src="sounds/bingBong.mp3"></audio>
    <audio
      data-key="70"
      src="sounds/airHorn.mp3"></audio>
    <audio
      data-key="71"
      src="sounds/windup.mp3"></audio>
    <audio
      data-key="72"
      src="sounds/bong.mp3"></audio>
    <audio
      data-key="74"
      src="sounds/winning.mp3"></audio>
    <audio
      data-key="75"
      src="sounds/scratch.mp3"></audio>
    <audio
      data-key="76"
      src="sounds/wonk.mp3"></audio>

    <script>
      function removeTransition(e) {
        if (e.propertyName !== "transform") return; // skip if it's not a transform
        e.target.classList.remove("playing");
      }

      function playSound(keyCode) {
        const audio = document.querySelector(`audio[data-key="${keyCode}"]`);
        const key = document.querySelector(`div[data-key="${keyCode}"]`);
        if (!audio) return; // stop the function from running all together
        key.classList.add("playing");
        audio.currentTime = 0; // rewind to the start
        audio.play();
      }

      const keys = document.querySelectorAll(".key");
      keys.forEach((key) => {
        key.addEventListener("transitionend", removeTransition);
        key.addEventListener("click", function () {
          // Add click event listener
          playSound(this.dataset.key);
        });
      });

      window.addEventListener("keydown", (e) => playSound(e.keyCode)); // keyboard listener
    </script>
  </body>
</html>
